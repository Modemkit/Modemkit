name: ci

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            Ymodem.Protocol/Ymodem.Protocol.csproj
            Ymodem.Protocol.Tests/Ymodem.Protocol.Tests.csproj

      - name: Restore
        run: dotnet restore ModemKit.slnx

      - name: Build
        run: dotnet build ModemKit.slnx --configuration Release --no-restore

      - name: Test net10.0 asset
        run: dotnet test Ymodem.Protocol.Tests/Ymodem.Protocol.Tests.csproj --configuration Release --no-build

      - name: Test netstandard2.0 asset
        run: dotnet test Ymodem.Protocol.Tests/Ymodem.Protocol.Tests.csproj --configuration Release --no-restore /p:ProtocolUnderTestTargetFramework=netstandard2.0
